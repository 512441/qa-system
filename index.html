.timeline{position:relative;padding-left:35px;margin-top:15px}
.timeline::before{content:'';position:absolute;left:12px;top:5px;bottom:5px;width:2px;background:#e0e0e0}
.timeline-item{position:relative;margin-bottom:22px}
.timeline-item::before{content:'';position:absolute;left:-27px;top:5px;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px #e0e0e0;background:#fff}

</style>

<script>
// ========== Supabase 初始化 ==========
const supabaseUrl = 'https://mcjiaozdiihisthjzqye.supabase.co';

const { createClient } = window.supabase;

const USERS = [
  {id:'U001',username:'yehuanzhu',password:'Livzon2026',real_name:'叶环珠',role:'manufacturing_supervisor',role_name:'制造部主管(申请人)',department:'非无菌制剂制造部'},
  {id:'U002',username:'lanmeiying',password:'Livzon2026',real_name:'蓝美英',role:'manufacturing_head',role_name:'发现部门负责人',department:'非无菌制剂制造部'},
  {id:'U003',username:'zhangchen',password:'Livzon2026',real_name:'张晨',role:'supply_chain',role_name:'供应链部负责人',department:'供应链部'},

  {id:'U005',username:'lvshuangfeng',password:'Livzon2026',real_name:'吕双凤',role:'qa_head',role_name:'QA负责人',department:'质量部'},
  {id:'U006',username:'sunlang',password:'Livzon2026',real_name:'孙朗',role:'quality_head',role_name:'质量管理负责人',department:'质量部'},
];
const APPROVAL_NODES = [
  {key:'manufacturing_head',name:'发现部门负责人',index:0},
  {key:'supply_chain',name:'供应链部负责人',index:1},
  {key:'qa_div',name:'分管QA',index:2},
  {key:'qa_head',name:'QA负责人',index:3},
  {key:'quality_head',name:'质量管理负责人',index:4},
];
const STATUS_LABELS = ['待部门负责人意见','待供应链部意见','待分管QA处理','待QA负责人审批','待质量负责人审批','已完成'];
const ABNORMAL_TYPES = ['外观异常','性状异常','含量异常','包装破损','效期不足','微生物超标','标签错误','数量短缺','运输条件异常','密封不严','异物/杂质','其他异常'];
const SOURCES = ['采购入库','退料','调拨','留样','退货复验'];

let currentUser = null;
let allApps = [];

// ========== 工具函数 ==========
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

async function loadApps() {
  try {
    var result = await supabaseClient.from('applications').select('*').order('created_at', { ascending: false });
    if (result.error) throw result.error;
    allApps = result.data || [];
  } catch(e) {
    console.error('加载申请失败:', e);
    allApps = [];
  }
}

// ========== 登录 ==========
function init() {
  // 检查是否已登录
  var saved = localStorage.getItem('qa_user');
  if (saved) {
    try {
      var user = JSON.parse(saved);
      currentUser = user;
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainPage').classList.remove('hidden');
      document.getElementById('currentUserInfo').textContent = user.real_name + '（' + user.role_name + '）';
      loadApps().then(function() { showPage('dashboard'); });
      return;
    } catch(e) {}
  }
  // 聚焦用户名输入框
  document.getElementById('loginUsername').focus();
}
init();

function doLogin() {
  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value;
  var errorEl = document.getElementById('loginError');
  
  if (!username) {
    errorEl.textContent = '请输入用户名';
    errorEl.style.display = 'block';
    document.getElementById('loginUsername').focus();
    return;
  }
  if (!password) {
    errorEl.textContent = '请输入密码';
    errorEl.style.display = 'block';
    document.getElementById('loginPassword').focus();
    return;
  }
  
  // 验证账号密码
  var user = null;
  for (var i = 0; i < USERS.length; i++) {
    if (USERS[i].username === username && USERS[i].password === password) {
      user = USERS[i];
      break;
    }
  }
  
  if (!user) {
    errorEl.textContent = '用户名或密码错误';
    errorEl.style.display = 'block';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginPassword').focus();
    return;
  }
  
  // 登录成功
  errorEl.style.display = 'none';
  currentUser = user;
  localStorage.setItem('qa_user', JSON.stringify(user));
  
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainPage').classList.remove('hidden');
  document.getElementById('currentUserInfo').textContent = user.real_name + '（' + user.role_name + '）';
  
  loadApps().then(function() {
    showPage('dashboard');
    toast('登录成功', 'success');
  });
}

function logout() {
  currentUser = null;
  localStorage.removeItem('qa_user');
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// ========== 页面切换 ==========
function showPage(page) {
  var items = document.querySelectorAll('.sidebar-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('active', items[i].dataset.page === page);
  }
  var c = document.getElementById('content');
  if (page === 'dashboard') renderDashboard(c);
  else if (page === 'apply') renderApply(c);
  else if (page === 'my') renderMyApps(c);
  else if (page === 'pending') renderPending(c);
  else if (page === 'all') renderAllApps(c);
  else if (page === 'ledger') renderLedger(c);
}

// ========== 仪表盘 ==========
function renderDashboard(el) {
  var now = new Date();
  var thisMonth = [];
  for (var i = 0; i < allApps.length; i++) {
    var a = allApps[i];
    var d = new Date(a.created_at);
    if (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth()) {
      thisMonth.push(a);
    }
  }
  var completed = allApps.filter(function(a) { return a.status === '已完成'; });
  var pending = allApps.filter(function(a) { return a.status !== '已完成'; });
  var supStats = {}, typeStats = {};
  for (var i = 0; i < allApps.length; i++) {
    var a = allApps[i];
    var sup = a.supplier_name || '未知';
    var type = a.abnormal_type || '其他异常';
    supStats[sup] = (supStats[sup] || 0) + 1;
    typeStats[type] = (typeStats[type] || 0) + 1;
  }
  var topSup = Object.entries(supStats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);
  var topTypes = Object.entries(typeStats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);

  var supHtml = topSup.length ? topSup.map(function(item, i) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0"><span style="font-weight:bold;color:#667eea;width:20px">' + (i+1) + '</span><span style="flex:1;font-size:14px">' + item[0] + '</span><span style="background:#f0f0ff;color:#667eea;padding:2px 10px;border-radius:10px;font-size:13px">' + item[1] + '次</span></div>';
  }).join('') : '<div style="color:#999;text-align:center;padding:20px">暂无数据</div>';
  
  var typeHtml = topTypes.length ? topTypes.map(function(item, i) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0"><span style="font-weight:bold;color:#667eea;width:20px">' + (i+1) + '</span><span style="flex:1;font-size:14px">' + item[0] + '</span><span style="background:#fff3e0;color:#e65100;padding:2px 10px;border-radius:10px;font-size:13px">' + item[1] + '次</span></div>';
  }).join('') : '<div style="color:#999;text-align:center;padding:20px">暂无数据</div>';

  el.innerHTML = '<div class="page-title">仪表盘</div>' +
    '<div class="stats-grid">' +
      '<div class="stat-card"><div class="num">' + thisMonth.length + '</div><div class="label">本月新增</div></div>' +

async function submitApplication() {
  var product = document.getElementById('f_product').value.trim();
  var supplier = document.getElementById('f_supplier').value.trim();
  var abnormal_type = document.getElementById('f_abnormal_type').value;
  var desc = document.getElementById('f_desc').value.trim();
  if (!product) return toast('请填写品名', 'error');
  if (!supplier) return toast('请填写供应商名称', 'error');
  if (!abnormal_type) return toast('请选择异常类型', 'error');
  if (!desc) return toast('请填写异常情况描述', 'error');

  try {
    var now = new Date().toISOString();
    var seq = allApps.length + 1;
    var app_no = 'ZYWL-' + now.slice(2,4) + now.slice(5,7) + '-' + String(seq).padStart(3,'0');
    var dev_no = 'PW' + now.slice(2,4) + now.slice(5,7) + '-' + String(seq).padStart(4,'0');
    
    var data = {
      app_no: app_no,
      deviation_no: dev_no,
      status: '待部门负责人意见',
      current_node: 0,
      applicant_name: currentUser.real_name,
      department: currentUser.department,
      product_name: product,
      spec: document.getElementById('f_spec').value.trim(),
      factory_batch: document.getElementById('f_factory_batch').value.trim(),
      supplier_batch: document.getElementById('f_supplier_batch').value.trim(),
      supplier_name: supplier,
      source: document.getElementById('f_source').value,
      quantity: document.getElementById('f_quantity').value.trim(),
      inspection_report_no: document.getElementById('f_report').value.trim(),
      abnormal_type: abnormal_type,
      unqualified_basis: document.getElementById('f_basis').value.trim(),
      abnormal_desc: desc,
      created_at: now,
      updated_at: now
    };
    
    var result = await supabaseClient.from('applications').insert([data]).select();
    if (result.error) throw result.error;
    
    toast('申请提交成功！单号：' + app_no, 'success');
    await loadApps();
    setTimeout(function() { showPage('my'); }, 1500);
  } catch(e) {
    toast('提交失败：' + (e.message || JSON.stringify(e)), 'error');
  }
}

async function doApprove(appId) {
  var opinion = document.getElementById('modal_opinion').value.trim();
  if (!opinion) return toast('请填写处理意见', 'error');
  var app = null;
  for (var i = 0; i < allApps.length; i++) {
    if (allApps[i].id === appId) {
      app = allApps[i];
      break;
    }
  }
  if (!app) return toast('申请不存在', 'error');
  
  var map = {manufacturing_head:0, supply_chain:1, qa_div:2, qa_head:3, quality_head:4};
  var node = map[currentUser.role];
  var now = new Date().toISOString();
  
  var fieldMap = ['finding_dept_leader_opinion', 'supply_dept_leader_opinion', 'qa_person_in_charge_opinion', 'qa_supervisor_opinion', 'quality_manager_opinion'];
  var sigFieldMap = ['finding_dept_leader_signed_at', 'supply_dept_leader_signed_at', 'qa_person_in_charge_signed_at', 'qa_supervisor_signed_at', 'quality_manager_signed_at'];
  
  var nextNode = node + 1;
  var isDone = nextNode >= APPROVAL_NODES.length;
  
  var updateData = {};
  updateData[fieldMap[node]] = opinion;
  updateData[sigFieldMap[node]] = now;
  updateData.status = isDone ? '已完成' : STATUS_LABELS[nextNode];
  updateData.current_node = isDone ? node : nextNode;
  updateData.updated_at = now;
  if (isDone) updateData.final_disposal_at = now;
  
  try {
    var result = await supabaseClient.from('applications').update(updateData).eq('id', appId);
    if (result.error) throw result.error;
    
    toast('审批提交成功', 'success');
    closeModal();
    await loadApps();
    showPage('pending');
  } catch(e) {
    toast('审批失败：' + (e.message || JSON.stringify(e)), 'error');
  }
}

// ========== 反馈函生成 ==========
function addWorkDays(startDate, days) {
  var date = new Date(startDate);
  var added = 0;
  while (added < days) {
    date.setDate(date.getDate() + 1);
    var day = date.getDay();
    if (day !== 0 && day !== 6) added++;
  }
  return date;
}

function formatDateCN(date) {
  var y = date.getFullYear();
  var m = String(date.getMonth() + 1).padStart(2, '0');
  var d = String(date.getDate()).padStart(2, '0');
  return y + '年' + m + '月' + d + '日';
}

function formatDateCNShort(date) {
  var y = date.getFullYear();
  var m = String(date.getMonth() + 1).padStart(2, '0');
  var d = String(date.getDate()).padStart(2, '0');
  return y + '年' + m + '月' + d + '日';
}

// ========== 供应商回复上传 ==========
async function uploadSupplierReply(appId, input) {
  var file = input.files[0];
  if (!file) return;
  
  try {
    toast('上传中...', '');
    
    // 生成安全文件名（去除中文和特殊字符，只保留扩展名）
    var ext = file.name.substring(file.name.lastIndexOf('.'));
    var safeName = 'supplier_reply_' + appId + '_' + Date.now() + ext;
    var result = await supabaseClient.storage.from('supplier-replies').upload(safeName, file);
    
    if (result.error) throw result.error;
    
    var urlResult = supabaseClient.storage.from('supplier-replies').getPublicUrl(safeName);
    
    await supabaseClient.from('applications').update({
      supplier_reply_url: urlResult.data.publicUrl,
      updated_at: new Date().toISOString()
    }).eq('id', appId);
    
    await loadApps();
    
    // 刷新模态框
    var app = null;
    for (var i = 0; i < allApps.length; i++) {
      if (allApps[i].id === appId) {
        app = allApps[i];
        break;
      }
    }
    if (app) {
      closeModal();
      openApprove(appId);
    }
    
    toast('附件上传成功', 'success');
    
  } catch(e) {
    toast('上传失败：' + (e.message || JSON.stringify(e)), 'error');
    console.error(e);
  }
}

async function removeSupplierReply(appId) {
  if (!confirm('确定删除已上传的附件吗？')) return;
  
  try {
    await supabaseClient.from('applications').update({
      supplier_reply_url: null,
      updated_at: new Date().toISOString()
    }).eq('id', appId);
    
    await loadApps();
    
    // 刷新模态框
    var app = null;
    for (var i = 0; i < allApps.length; i++) {
      if (allApps[i].id === appId) {
        app = allApps[i];
        break;
      }
    }
    if (app) {
      closeModal();
      openApprove(appId);
    }
    
    toast('附件已删除', 'success');
    
  } catch(e) {
    toast('删除失败：' + (e.message || JSON.stringify(e)), 'error');
  }
}
